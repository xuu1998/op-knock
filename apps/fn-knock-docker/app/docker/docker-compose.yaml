services:
  fn-knock:
    image: ghcr.io/xuu1998/op-knock:latest
    container_name: fn-knock-docker
    restart: unless-stopped
    environment:
      TZ: ${wizard_tz:-Asia/Shanghai}
      FN_KNOCK_RUNTIME_TARGET: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FN_KNOCK_DATA_DIR: /var/lib/fn-knock
      FN_KNOCK_GATEWAY_CONFIG_DIR: /usr/local/etc/fn-knock
      ADMIN_VIEW_PORT: ${wizard_admin_view_port:-7991}
      BACKEND_PORT: ${wizard_backend_port:-7998}
      AUTH_PORT: ${wizard_auth_port:-7997}
      GO_BACKEND_PORT: ${wizard_go_backend_port:-7996}
      GO_REPROXY_PORT: ${wizard_go_reproxy_port:-8999}
      DOCKER_ADMIN_TRUSTED_PROXY_CIDRS: ${wizard_admin_trusted_proxy_cidrs:-}
      DOCKER_DISCOVER_LAN_IP: ${wizard_discover_lan_ip:-}
      DDNS_HOST_IF_INET6_PATH: /host/proc/net/if_inet6
      ADMIN_VIEW_HOST: 0.0.0.0
      BACKEND_HOST: 127.0.0.1
    ports:
      - "${wizard_admin_view_port:-7991}:${wizard_admin_view_port:-7991}"
      - "${wizard_go_reproxy_port:-8999}:${wizard_go_reproxy_port:-8999}"
    networks:
      - fn_knock_net
    volumes:
      - fn_knock_docker_data:/var/lib/fn-knock
      - fn_knock_docker_gateway:/usr/local/etc/fn-knock
      - /proc/1/net:/host/proc/net:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${wizard_admin_view_port:-7991}/api/admin/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-bookworm
    container_name: fn-knock-docker-redis
    restart: unless-stopped
    environment:
      TZ: ${wizard_tz:-Asia/Shanghai}
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - fn_knock_net
    volumes:
      - fn_knock_docker_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  fn_knock_docker_data:
  fn_knock_docker_gateway:
  fn_knock_docker_redis:

networks:
  fn_knock_net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${wizard_docker_ipv4_subnet:-172.30.0.0/16}
        - subnet: ${wizard_docker_ipv6_subnet:-fd42:fb33:7f7a:100::/64}
